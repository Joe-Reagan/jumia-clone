<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log/signup</title>
    <link rel="stylesheet" href="ztyle.css">
</head>
<body>
    <a href="index.html" style="position: absolute; top: 10px; left: 10px; color: white;">Back to Home</a>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="Logo" height="50px" width="60px">
            <p>Joe Tush</p>
        </div>
        <div class="form-container login-container active">
            <h2>Login</h2>
            <form action="dashboard.html" method="post">
                <label for="login-email">Email:</label>
                <input type="email" id="login-email" name="email" placeholder="Enter your email" required>
                <label for="login-password">Password:</label>
                <input type="password" id="login-password" name="password" placeholder="Enter your password" required>
                <div class="role-selection">
                    <label><input type="radio" name="role" value="user" checked> User</label>
                    <label><input type="radio" name="role" value="worker"> Worker</label>
                </div>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
        </div>
        <div class="form-container signup-container">
            <h2>Sign Up</h2>
            <form action="dashboard.html" method="post">
                <label for="signup-name">Name:</label>
                <input type="text" id="signup-name" name="name" placeholder="Enter your full name" required>
                <label for="signup-email">Email:</label>
                <input type="email" id="signup-email" name="email" placeholder="Enter your email" required>
                <label for="signup-password">Password:</label>
                <input type="password" id="signup-password" name="password" placeholder="Create a password" required minlength="6">
                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                <div class="role-selection">
                    <label><input type="radio" name="role" value="user" checked> User</label>
                    <label><input type="radio" name="role" value="worker"> Worker</label>
                </div>
                <button type="submit">Sign Up</button>
            </form>
            <p>Already have an account? <a href="#" id="show-login">Login</a></p>
        </div>
        </div>
    </div>
    
    <script>
        const loginContainer = document.querySelector('.login-container');
        const signupContainer = document.querySelector('.signup-container');
        const showSignup = document.getElementById('show-signup');
        const showLogin = document.getElementById('show-login');

        showSignup.addEventListener('click', (e) => {
            e.preventDefault();
            loginContainer.classList.remove('active');
            signupContainer.classList.add('active');
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            signupContainer.classList.remove('active');
            loginContainer.classList.add('active');
        });

        // Simple validation for signup
        const signupForm = document.querySelector('.signup-container form');
        signupForm.addEventListener('submit', (e) => {
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match!');
            }
        });

        // Set action based on role
        const loginForm = document.querySelector('.login-container form');
        const signupForm2 = document.querySelector('.signup-container form');

        loginForm.addEventListener('submit', (e) => {
            const role = loginForm.querySelector('input[name="role"]:checked').value;
            if (role === 'worker') {
                loginForm.action = 'worker.html';
            } else {
                loginForm.action = 'dashboard.html';
            }
        });

        signupForm2.addEventListener('submit', (e) => {
            const role = signupForm2.querySelector('input[name="role"]:checked').value;
            if (role === 'worker') {
                signupForm2.action = 'worker.html';
            } else {
                signupForm2.action = 'dashboard.html';
            }
        });
    </script>
</body>
</html>

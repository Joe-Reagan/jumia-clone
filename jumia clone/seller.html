<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Seller</title>
    <link rel="stylesheet" href="ztyle.css">
</head>
<body>
    <a href="index.html" style="position: absolute; top: 10px; left: 10px; color: white;">Back to Home</a>
    <div class="container">
        <div class="logo">
            <img src="logo.png" alt="Logo" height="50px" width="60px">
            <p>Joe Tush</p>
        </div>
        <div class="form-container seller-container active">
            <h2>Become a Seller</h2>
            <form action="dashboard.html" method="post">
                <label for="seller-name">Full Name:</label>
                <input type="text" id="seller-name" name="name" placeholder="Enter your full name" required>

                <label for="seller-email">Email:</label>
                <input type="email" id="seller-email" name="email" placeholder="Enter your email" required>

                <label for="seller-phone">Phone Number:</label>
                <input type="tel" id="seller-phone" name="phone" placeholder="Enter your phone number" required>

                <label for="seller-business">Business Name:</label>
                <input type="text" id="seller-business" name="business" placeholder="Enter your business name" required>

                <label for="seller-address">Address:</label>
                <textarea id="seller-address" name="address" placeholder="Enter your address" required></textarea>

                <button type="submit">Register as Seller</button>
            </form>
            <p>Already a seller? <a href="login.html">Login</a></p>
        </div>
    </div>
    
</body>
</html></content>
